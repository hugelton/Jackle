name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run smoke

  build-wasm:
    runs-on: macos-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: emscripten-actions/setup-emscripten@v4
        with:
          emscripten-version: latest
      - run: cmake --version
      - run: npm run build:wasm --workspace
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: |
            samples/JackleSine/web/jackle-dsp.js
            samples/JackleSine/web/jackle-dsp.wasm
            samples/JackleSine/gui/**
            samples/JackleSine/index.html
          if-no-files-found: error

  pages-preview:
    runs-on: macos-latest
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: emscripten-actions/setup-emscripten@v4
        with:
          emscripten-version: latest
      - run: npm run build:wasm --workspace
      - uses: actions/upload-artifact@v4
        with:
          name: pages-build
          path: pages/
