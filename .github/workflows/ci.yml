name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run smoke

  build-wasm:
    runs-on: macos-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install emsdk
        run: |
          git clone https://github.com/emscripten-core/emsdk.git /tmp/emsdk
          cd /tmp/emsdk
          ./emsdk install latest
          ./emsdk activate latest
          echo "/tmp/emsdk" >> $GITHUB_PATH
          echo "EMSDK=/tmp/emsdk" >> $GITHUB_ENV
      - run: cmake --version
      - run: npm run build:wasm
        working-directory: samples/JackleSine
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: |
            samples/JackleSine/web/jackle-dsp.js
            samples/JackleSine/web/jackle-dsp.wasm
            samples/JackleSine/gui/**

  pages-preview:
    runs-on: macos-latest
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install emsdk
        run: |
          git clone https://github.com/emscripten-core/emsdk.git /tmp/emsdk
          cd /tmp/emsdk
          ./emsdk install latest
          ./emsdk activate latest
          echo "/tmp/emsdk" >> $GITHUB_PATH
          echo "EMSDK=/tmp/emsdk" >> $GITHUB_ENV
      - run: npm run build:wasm
        working-directory: samples/JackleSine
      - run: node ./scripts/export-pages.js
        working-directory: samples/JackleSine
      - uses: actions/upload-artifact@v4
        with:
          name: pages-build
          path: pages/
